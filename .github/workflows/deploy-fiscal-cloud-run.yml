name: Deploy fiscal service to Cloud Run

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  SERVICE: pclaf-fiscal
  REPOSITORY: pclaf-containers
  REGION: us-central1

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: fiscal-homologacion
    steps:
      - uses: actions/checkout@v4

      - name: Notify deploy started
        env:
          PCLAF_CONTROL_DISCORD_ENABLED: "true"
          PCLAF_CONTROL_DISCORD_DEPLOYS_WEBHOOK_URL: ${{ secrets.PCLAF_CONTROL_DISCORD_DEPLOYS_WEBHOOK_URL }}
          FISCAL_SERVICE_TOKEN: ci-notification-only
          FISCAL_MASTER_KEY_BASE64: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
        run: node fiscal-server/scripts/notify-deploy.mjs started --environment=homologacion --commit=${{ github.sha }} --branch=${{ github.ref_name }} --author=${{ github.actor }} --pipeline=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      # Workload Identity Federation: no service-account JSON key is stored in GitHub.
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build and publish image
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
        run: |
          gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet
          IMAGE="${REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${REPOSITORY}/${SERVICE}:${GITHUB_SHA}"
          docker build --tag "$IMAGE" fiscal-server
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy private service
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          RUNTIME_SERVICE_ACCOUNT: ${{ vars.FISCAL_RUNTIME_SERVICE_ACCOUNT }}
          PCLAF_CONTROL_DISCORD_ENABLED: ${{ vars.PCLAF_CONTROL_DISCORD_ENABLED }}
          PCLAF_CONTROL_TELEGRAM_ENABLED: ${{ vars.PCLAF_CONTROL_TELEGRAM_ENABLED }}
          NOTIFICATIONS_ENVIRONMENT: ${{ vars.NOTIFICATIONS_ENVIRONMENT }}
        run: |
          gcloud run deploy "$SERVICE" \
            --project "$GCP_PROJECT_ID" \
            --region "$REGION" \
            --image "$IMAGE" \
            --service-account "$RUNTIME_SERVICE_ACCOUNT" \
            --no-allow-unauthenticated \
            --set-env-vars "ARCA_ENVIRONMENT=homologacion,FISCAL_STORE=supabase,SUPABASE_URL=${SUPABASE_URL},PCLAF_CONTROL_DISCORD_ENABLED=${PCLAF_CONTROL_DISCORD_ENABLED},PCLAF_CONTROL_TELEGRAM_ENABLED=${PCLAF_CONTROL_TELEGRAM_ENABLED},NOTIFICATIONS_ENVIRONMENT=${NOTIFICATIONS_ENVIRONMENT},ARCA_TIMEOUT_MS=15000,ARCA_ATTEMPT_TIMEOUT_MS=4500,ARCA_MAX_ATTEMPTS=2,ARCA_CIRCUIT_FAILURE_THRESHOLD=3,ARCA_CIRCUIT_COOLDOWN_MS=60000,FISCAL_RATE_WINDOW_MS=60000,FISCAL_GLOBAL_RATE_PER_WINDOW=60,FISCAL_TENANT_RATE_PER_WINDOW=15,FISCAL_INVOICE_RATE_PER_WINDOW=6,FISCAL_EMERGENCY_STOP_CACHE_MS=5000,FISCAL_PROCESSING_LEASE_SECONDS=50" \
            --set-secrets "FISCAL_MASTER_KEY_BASE64=pclaf-fiscal-master-key:latest,FISCAL_SERVICE_TOKEN=pclaf-fiscal-service-token:latest,SUPABASE_SERVICE_ROLE_KEY=pclaf-supabase-service-role:latest,PCLAF_CONTROL_DISCORD_GENERAL_WEBHOOK_URL=pclaf-control-discord-general-webhook-url:latest,PCLAF_CONTROL_DISCORD_LOGS_WEBHOOK_URL=pclaf-control-discord-logs-webhook-url:latest,PCLAF_CONTROL_DISCORD_ALERTAS_WEBHOOK_URL=pclaf-control-discord-alertas-webhook-url:latest,PCLAF_CONTROL_DISCORD_ARCA_WEBHOOK_URL=pclaf-control-discord-arca-webhook-url:latest,PCLAF_CONTROL_DISCORD_SEGURIDAD_WEBHOOK_URL=pclaf-control-discord-seguridad-webhook-url:latest,PCLAF_CONTROL_TELEGRAM_BOT_TOKEN=pclaf-control-telegram-bot-token:latest,PCLAF_CONTROL_TELEGRAM_CHAT_ID=pclaf-control-telegram-chat-id:latest" \
            --port 8080 \
            --cpu 1 \
            --memory 512Mi \
            --cpu-throttling \
            --min-instances 0 \
            --max-instances 1 \
            --concurrency 4 \
            --timeout 45s \
            --ingress all

      - name: Allow only the Edge Function invoker
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          FISCAL_EDGE_INVOKER_SERVICE_ACCOUNT: ${{ vars.FISCAL_EDGE_INVOKER_SERVICE_ACCOUNT }}
        run: |
          test -n "$FISCAL_EDGE_INVOKER_SERVICE_ACCOUNT"
          gcloud run services add-iam-policy-binding "$SERVICE" \
            --project "$GCP_PROJECT_ID" --region "$REGION" \
            --member "serviceAccount:$FISCAL_EDGE_INVOKER_SERVICE_ACCOUNT" \
            --role roles/run.invoker

      - name: Keep only five inactive revisions
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
        run: |
          mapfile -t REVISIONS < <(gcloud run revisions list --service "$SERVICE" --project "$GCP_PROJECT_ID" --region "$REGION" --sort-by='~metadata.creationTimestamp' --format='value(metadata.name)')
          for REVISION in "${REVISIONS[@]:5}"; do
            gcloud run revisions delete "$REVISION" --project "$GCP_PROJECT_ID" --region "$REGION" --quiet || true
          done

      - name: Notify deploy success
        env:
          PCLAF_CONTROL_DISCORD_ENABLED: "true"
          PCLAF_CONTROL_DISCORD_DEPLOYS_WEBHOOK_URL: ${{ secrets.PCLAF_CONTROL_DISCORD_DEPLOYS_WEBHOOK_URL }}
          FISCAL_SERVICE_TOKEN: ci-notification-only
          FISCAL_MASTER_KEY_BASE64: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
        run: node fiscal-server/scripts/notify-deploy.mjs success --environment=homologacion --commit=${{ github.sha }} --branch=${{ github.ref_name }} --author=${{ github.actor }} --pipeline=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Notify deploy failure
        if: failure()
        env:
          PCLAF_CONTROL_DISCORD_ENABLED: "true"
          PCLAF_CONTROL_DISCORD_DEPLOYS_WEBHOOK_URL: ${{ secrets.PCLAF_CONTROL_DISCORD_DEPLOYS_WEBHOOK_URL }}
          FISCAL_SERVICE_TOKEN: ci-notification-only
          FISCAL_MASTER_KEY_BASE64: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
        run: node fiscal-server/scripts/notify-deploy.mjs failed --environment=homologacion --commit=${{ github.sha }} --branch=${{ github.ref_name }} --author=${{ github.actor }} --pipeline=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} || true
