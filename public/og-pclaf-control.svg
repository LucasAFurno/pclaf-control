<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">PCLAF Control</title>
  <desc id="desc">Ventas, caja y stock desde una sola web</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#090909"/>
      <stop offset="100%" stop-color="#161616"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff4d45"/>
      <stop offset="100%" stop-color="#d91515"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1110" cy="86" r="136" fill="#1f1f1f" opacity=".28"/>
  <circle cx="120" cy="546" r="164" fill="#244d18" opacity=".20"/>

  <g transform="translate(72 64)">
    <image href="/favicon.svg" x="0" y="0" width="108" height="108" preserveAspectRatio="xMidYMid meet"/>
    <text x="136" y="34" fill="#9ca3af" font-size="18" font-family="Arial, sans-serif" letter-spacing="5">SISTEMA COMERCIAL WEB</text>
    <text x="136" y="94" fill="#f5f7fb" font-size="60" font-weight="700" font-family="Arial, sans-serif">PCLAF Control</text>
    <text x="136" y="146" fill="#d0d8e5" font-size="28" font-family="Arial, sans-serif">Ventas, caja y stock desde una sola web</text>
  </g>

  <g transform="translate(72 236)">
    <rect width="1056" height="324" rx="30" fill="#111111" stroke="#252525"/>
    <rect x="38" y="34" width="980" height="56" rx="18" fill="#171717" stroke="#2b2b2b"/>
    <text x="66" y="70" fill="#f5f7fb" font-size="24" font-weight="700" font-family="Arial, sans-serif">Operación del local</text>
    <rect x="804" y="18" width="88" height="88" rx="22" fill="#141414" stroke="#2c2c2c"/>
    <rect x="910" y="18" width="108" height="88" rx="22" fill="#141414" stroke="#2c2c2c"/>
    <text x="832" y="60" fill="#ffffff" font-size="26" font-weight="700" font-family="Arial, sans-serif">24</text>
    <text x="832" y="84" fill="#9ca3af" font-size="14" font-family="Arial, sans-serif">ventas</text>
    <text x="940" y="60" fill="#ffffff" font-size="26" font-weight="700" font-family="Arial, sans-serif">$248k</text>
    <text x="940" y="84" fill="#9ca3af" font-size="14" font-family="Arial, sans-serif">caja</text>

    <rect x="38" y="126" width="520" height="160" rx="24" fill="#151515" stroke="#2b2b2b"/>
    <text x="72" y="170" fill="#9ca3af" font-size="18" font-family="Arial, sans-serif">VENTAS</text>
    <text x="72" y="216" fill="#f5f7fb" font-size="40" font-weight="700" font-family="Arial, sans-serif">Registrar y cobrar</text>
    <rect x="72" y="236" width="200" height="44" rx="14" fill="url(#accent)"/>
    <text x="102" y="264" fill="#ffffff" font-size="20" font-weight="700" font-family="Arial, sans-serif">Nueva venta</text>

    <rect x="588" y="126" width="430" height="70" rx="20" fill="#151515" stroke="#2b2b2b"/>
    <rect x="588" y="216" width="430" height="70" rx="20" fill="#151515" stroke="#2b2b2b"/>
    <text x="620" y="170" fill="#f5f7fb" font-size="24" font-weight="700" font-family="Arial, sans-serif">Stock al día</text>
    <text x="620" y="258" fill="#f5f7fb" font-size="24" font-weight="700" font-family="Arial, sans-serif">Caja clara</text>
  </g>
